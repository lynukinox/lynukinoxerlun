# 服务端口
server.port=8080

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/smart_note?useUnicode=true&characterEncoding=UTF-8&serverTimezone=GMT%2B8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.configuration.map-underscore-to-camel-case=true

# Spring AI 配置 [cite: 10, 176]
# 建议使用环境变量，防止 key 泄露
spring.ai.openai.api-key=${AI_API_KEY:your_key_here}
# 文档建议使用实惠的普通模型 [cite: 10]
spring.ai.openai.chat.options.model=gpt-3.5-turbo 
# 如果使用国内中转地址，请配置 base-url
# spring.ai.openai.base-url=https://api.example.com

# 日志配置 [cite: 102]
logging.level.root=info
logging.level.com.lihua.smartnote.mapper=debug